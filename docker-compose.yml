version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legalai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/legalai
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      CORS_ORIGINS: http://localhost:3004,http://localhost:3005
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8004/api/v1
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
    depends_on:
      backend:
        condition: service_healthy

  atlas:
    build:
      context: ./atlas
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8004/api/v1
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
